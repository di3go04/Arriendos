name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7

  e2e:
    name: E2E Playwright (skipped — requires running app + Supabase)
    runs-on: ubuntu-latest
    needs: build
    # E2E tests require a running dev server with Supabase configured.
    # Since this is a pre-revenue project being sold as-is, E2E is disabled
    # in CI. Buyers can run E2E locally with: npx playwright test
    if: ${{ false }}
    steps:
      - run: echo "E2E tests are disabled in CI. Run locally with 'npx playwright test'."

  deploy:
    name: Deploy (Vercel auto-deploys on push, this job is informational only)
    runs-on: ubuntu-latest
    needs: build
    # Skip this job entirely — Vercel auto-deploys on push to main.
    # This job only runs if secrets are configured, otherwise it's skipped gracefully.
    if: ${{ false }}
    steps:
      - run: echo "Vercel auto-deploys on push to main. No manual deploy needed."
