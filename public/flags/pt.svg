<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 15">
  <!-- Portugal: verde-rojo con escudo simplificado -->
  <rect width="20" height="15" fill="#FF0000"/>
  <rect width="8" height="15" fill="#006600"/>
  <!-- Escudo simplificado sobre la franja verde-roja -->
  <circle cx="8" cy="7.5" r="2.5" fill="#FFD700" opacity="0.9"/>
  <circle cx="8" cy="7.5" r="1.8" fill="#FF0000" opacity="0.9"/>
  <!-- Cruz azul del escudo -->
  <rect x="6.7" y="7.1" width="2.6" height="0.8" fill="#003087" opacity="0.9"/>
  <rect x="7.6" y="6.2" width="0.8" height="2.6" fill="#003087" opacity="0.9"/>
</svg>
