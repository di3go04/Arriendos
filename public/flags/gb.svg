<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 15">
  <!-- Reino Unido: Union Jack completo -->
  <rect width="20" height="15" fill="#012169"/>
  <!-- Diagonales blancas (Cruz de San Andrés) -->
  <path d="M0 0 L20 15 M20 0 L0 15" stroke="#fff" stroke-width="3"/>
  <!-- Diagonales rojas (Cruz de San Patricio) -->
  <path d="M0 0 L20 15" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 5"/>
  <path d="M20 0 L0 15" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 5"/>
  <!-- Cruz blanca horizontal/vertical (Cruz de San Jorge) -->
  <rect x="0" y="5.5" width="20" height="4" fill="#fff"/>
  <rect x="7.5" y="0" width="5" height="15" fill="#fff"/>
  <!-- Cruz roja (San Jorge) -->
  <rect x="0" y="6.25" width="20" height="2.5" fill="#C8102E"/>
  <rect x="8.25" y="0" width="3.5" height="15" fill="#C8102E"/>
</svg>
